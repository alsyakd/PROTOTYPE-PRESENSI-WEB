<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System - SMK Syubbanul Wathon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #1e40af;
            --primary-light-blue: #3b82f6;
            --accent-green: #10b981;
            --card-white: #ffffff;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --soft-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            font-family: 'Poppins', 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            animation: fadeInBg 1s ease-in;
        }

        @keyframes fadeInBg {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px 40px;
            box-shadow: var(--glass-shadow);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: var(--soft-shadow);
        }

        .header-text h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--accent-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-text p {
            margin: 0;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
        }

        /* Main Container */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Main Card */
        .attendance-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: var(--glass-shadow);
            width: 100%;
            max-width: 1100px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .attendance-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(31, 38, 135, 0.3);
        }

        .card-content {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 40px;
            align-items: center;
        }

        /* Left Section - Clock */
        .left-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .school-logo-circle {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
            box-shadow: var(--soft-shadow);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: var(--soft-shadow), 0 0 20px rgba(102, 126, 234, 0.4);
            }
            50% {
                box-shadow: var(--soft-shadow), 0 0 40px rgba(102, 126, 234, 0.8);
            }
        }

        .digital-clock {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--accent-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            min-height: 60px;
        }

        .date-display {
            font-size: 16px;
            color: #666;
            font-weight: 500;
        }

        /* Middle Section - Input */
        .middle-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-label {
            font-size: 14px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .attendance-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .scan-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--accent-green) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--soft-shadow);
            flex-shrink: 0;
        }

        .scan-icon:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .attendance-input {
            flex: 1;
            padding: 18px 25px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .attendance-input:focus {
            outline: none;
            border-color: var(--primary-light-blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1), inset 0 0 20px rgba(102, 126, 234, 0.1);
            background: white;
            transform: scale(1.02);
        }

        .attendance-input::placeholder {
            color: #ccc;
        }

        /* Right Section - Profile */
        .right-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .profile-photo {
            width: 140px;
            height: 140px;
            border-radius: 20px;
            box-shadow: var(--soft-shadow);
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .profile-info {
            text-align: center;
            width: 100%;
        }

        .user-name {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 5px;
        }

        .user-status {
            display: inline-block;
            padding: 8px 18px;
            background: linear-gradient(135deg, var(--accent-green) 0%, #059669 100%);
            color: white;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: var(--soft-shadow);
        }

        /* Footer */
        .footer {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            box-shadow: var(--glass-shadow);
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .card-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .attendance-card {
                padding: 30px;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }

            .header-content {
                gap: 12px;
            }

            .header-text h1 {
                font-size: 20px;
            }

            .header-text p {
                font-size: 12px;
            }

            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 22px;
            }

            .main-container {
                padding: 20px;
            }

            .attendance-card {
                padding: 20px;
            }

            .card-content {
                gap: 20px;
            }

            .left-section {
                gap: 15px;
            }

            .school-logo-circle {
                width: 90px;
                height: 90px;
                font-size: 45px;
            }

            .digital-clock {
                font-size: 36px;
            }

            .date-display {
                font-size: 14px;
            }

            .profile-photo {
                width: 100px;
                height: 100px;
                font-size: 50px;
            }

            .user-name {
                font-size: 16px;
            }

            .attendance-input {
                padding: 15px 20px;
                font-size: 16px;
            }

            .scan-icon {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .header-text h1 {
                font-size: 18px;
            }

            .digital-clock {
                font-size: 32px;
            }

            .school-logo-circle {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }

            .profile-photo {
                width: 90px;
                height: 90px;
                font-size: 45px;
            }

            .attendance-input {
                padding: 12px 15px;
                font-size: 14px;
            }

            .scan-icon {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo-icon">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <div class="header-text">
                <h1>Attendance System</h1>
                <p>SMK Syubbanul Wathon</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="attendance-card">
            <div class="card-content">
                <!-- Left Section -->
                <div class="left-section">
                    <div class="school-logo-circle">
                        <i class="bi bi-mortarboard-fill"></i>
                    </div>
                    <div class="digital-clock" id="clock">00:00:00</div>
                    <div class="date-display" id="date">--/--/----</div>
                </div>

                <!-- Middle Section -->
                <div class="middle-section">
                    <label class="input-label">Attendance Entry</label>
                    <div class="attendance-input-wrapper">
                        <div class="scan-icon" title="Scan Card">
                            <i class="bi bi-qr-code"></i>
                        </div>
                        <input 
                            type="text" 
                            class="attendance-input" 
                            id="attendanceInput"
                            placeholder="Scan card / Enter ID"
                            autocomplete="off"
                        >
                    </div>
                </div>

                <!-- Right Section -->
                <div class="right-section">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200&h=200&fit=crop" alt="User profile" class="profile-photo" style="width: 140px; height: 140px; object-fit: cover;">
                    <div class="profile-info">
                        <div class="user-name">Djays Nur Salim</div>
                        <div class="user-status">
                            <i class="bi bi-person-fill"></i> Teacher
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        Powered by Your Name © 2026
    </footer>

    <!-- JavaScript -->
    <script>
        // Real-time Clock
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // Real-time Date
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = now.toLocaleDateString('en-US', options);
            
            document.getElementById('date').textContent = formattedDate;
        }

        // Input Focus Animation
        document.getElementById('attendanceInput').addEventListener('focus', function() {
            this.style.animation = 'pulse 0.5s ease-out';
        });

        document.getElementById('attendanceInput').addEventListener('blur', function() {
            this.style.animation = 'none';
        });

        // Scan Icon Click Handler
        document.querySelector('.scan-icon').addEventListener('click', function() {
            document.getElementById('attendanceInput').focus();
        });

        // Initialize
        updateClock();
        updateDate();

        // Update clock every second
        setInterval(updateClock, 1000);

        // Update date every minute
        setInterval(updateDate, 60000);

        // Add pulse animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0% { transform: scale(1); }
                50% { transform: scale(1.02); }
                100% { transform: scale(1); }
            }
        `;
        document.head.appendChild(style);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
