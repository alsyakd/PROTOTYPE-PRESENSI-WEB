<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard Presensi Syubbanul Wathon</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      .running-text {
        overflow: hidden;
        white-space: nowrap;
      }

      .running-text span {
        display: inline-block;
        padding-left: 100%;
        animation: run 20s linear infinite;
      }

      @keyframes run {
        0% {
          transform: translateX(0);
        }

        100% {
          transform: translateX(-100%);
        }
      }
    </style>
  </head>

  <body
    class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white"
  >
    <!-- HEADER -->

    <header
      class="flex justify-between items-center p-6 bg-black/30 backdrop-blur-xl shadow-xl"
    >
      <div class="flex items-center gap-4">
        <img src="/assets/cropped-SMK-T.png" class="w-14" />

        <div>
          <h1 class="text-2xl font-bold">SMK SYUBBANUL WATHON</h1>

          <p class="text-slate-400">Dashboard Presensi Digital</p>
        </div>
      </div>

      <div class="text-right">
        <div id="tanggal" class="text-lg"></div>

        <div id="jam" class="text-4xl font-bold text-cyan-400"></div>
      </div>
    </header>

    <!-- CONTENT -->

    <div class="grid grid-cols-12 gap-6 p-6">
      <!-- VIDEO CENTER -->

      <div class="col-span-8">
        <div
          class="bg-black rounded-2xl overflow-hidden shadow-2xl border border-slate-700"
        >
          <iframe
            class="w-full h-[500px]"
            src="https://www.youtube.com/embed/YOUR_VIDEO"
            allowfullscreen
          >
          </iframe>
        </div>

        <!-- RUNNING TEXT -->

        <div class="mt-4 bg-cyan-600 rounded-xl p-3 running-text">
          <span>
            Selamat datang di Sistem Presensi Digital • Disiplin adalah kunci
            kesuksesan • SMK SYUBBANUL WATHON
          </span>
        </div>

        <!-- JADWAL -->

        <div class="mt-6 bg-slate-800 rounded-xl p-4">
          <h2 class="text-xl font-bold mb-4">Jadwal Hari Ini</h2>

          <table class="w-full">
            <thead class="text-cyan-400">
              <tr>
                <th class="text-left">Jam</th>
                <th class="text-left">Mapel</th>
                <th class="text-left">Guru</th>
                <th class="text-left">Kelas</th>
              </tr>
            </thead>

            <tbody class="text-slate-300">
              <tr class="border-t border-slate-700">
                <td>07:00</td>
                <td>Pemrograman</td>
                <td>Djayus</td>
                <td>XII RPL</td>
              </tr>

              <tr class="border-t border-slate-700">
                <td>09:00</td>
                <td>Database</td>
                <td>Solihin</td>
                <td>XII RPL</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- SIDEBAR PRESENSI -->

      <div class="col-span-4">
        <div class="bg-slate-800 rounded-xl p-4 h-full">
          <h2 class="text-xl font-bold mb-4">Live Presensi</h2>

          <div id="presensi" class="space-y-3">
            <!-- CARD -->

            <div
              class="flex items-center gap-3 bg-slate-700 p-3 rounded-xl animate-pulse"
            >
              <img src="https://i.pravatar.cc/40" class="rounded-full" />

              <div>
                <p class="font-semibold">Ahmad Fauzan</p>

                <p class="text-sm text-green-400">Hadir • 07:01</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // JAM REALTIME

      function updateJam() {
        let now = new Date();

        document.getElementById("jam").innerHTML =
          now.toLocaleTimeString("id-ID");

        document.getElementById("tanggal").innerHTML = now.toLocaleDateString(
          "id-ID",
          {
            weekday: "long",
            day: "numeric",
            month: "long",
            year: "numeric",
          },
        );
      }

      setInterval(updateJam, 1000);

      updateJam();

      // SIMULASI LIVE PRESENSI

      setInterval(() => {
        let nama = ["Naya", "Damar", "Fajar", "Rizki", "Lita"];

        let randomNama = nama[Math.floor(Math.random() * nama.length)];

        let card = `

<div class="flex items-center gap-3 bg-slate-700 p-3 rounded-xl">

<img src="https://i.pravatar.cc/40?u=${randomNama}" class="rounded-full">

<div>

<p class="font-semibold">

${randomNama}

</p>

<p class="text-sm text-green-400">

Hadir • ${new Date().toLocaleTimeString()}

</p>

</div>

</div>

`;

        document
          .getElementById("presensi")
          .insertAdjacentHTML("afterbegin", card);
      }, 5000);
    </script>
  </body>
</html>
